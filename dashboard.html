<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <title>Dashboard</title>

  <style>
    body{margin:0;font-family:Arial;background:#0f172a;color:#fff;display:flex}

    .sidebar{
      width:220px;background:#020617;height:100vh;padding:20px
    }

    .sidebar img{width:80px;display:block;margin:auto}

    .menu div{
      padding:10px;margin:6px 0;border-radius:8px;cursor:pointer
    }

    .menu div:hover{background:#1e293b}

    .main{flex:1;padding:20px}

    .cards{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px
    }

    .card{
      background:#1e293b;
      padding:16px;
      border-radius:10px
    }

    #content{
      margin-top:20px;
      background:#1e293b;
      padding:16px;
      border-radius:10px
    }

    table{width:100%;border-collapse:collapse;margin-top:10px}
    th,td{padding:10px}
    th{background:#334155}
    tr:nth-child(even){background:#1e293b}
    tr:nth-child(odd){background:#0f172a}

    input,select{
      width:100%;
      padding:8px;
      border-radius:6px;
      border:none;
      margin-bottom:8px
    }

    button{
      padding:8px 12px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      background:#3b82f6;
      color:white;
      margin:2px
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <img src="logo.png">
  <h3 style="text-align:center">SSB</h3>

  <div class="menu">
    <div onclick="loadPage('dashboard')">Dashboard</div>
    <div onclick="loadPage('siswa')">Data Siswa</div>
    <div onclick="loadPage('absensi')">Absensi</div>
    <div onclick="loadPage('pembayaran')">Pembayaran</div>
    <div onclick="logout()">Logout</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <h2 id="welcome"></h2>

  <!-- CARDS -->
  <div class="cards">
    <div class="card">Siswa<br><b id="cSiswa">-</b></div>
    <div class="card">Hadir<br><b id="cHadir">-</b></div>
    <div class="card">Kas<br><b id="cKas">-</b></div>
    <div class="card">Tunggakan<br><b id="cTunggakan">-</b></div>
  </div>

  <!-- CHART -->
  <div style="margin-top:20px; display:grid; grid-template-columns:1fr 1fr; gap:20px;">
    <div class="card">
      <h3>Grafik Kas</h3>
      <canvas id="chartKas"></canvas>
    </div>

    <div class="card">
      <h3>Grafik Absensi</h3>
      <canvas id="chartAbsensi"></canvas>
    </div>
  </div>

  <!-- CONTENT -->
  <div id="content">Selamat datang</div>
</div>

<!-- MODAL (SATU SAJA!) -->
<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.6); justify-content:center; align-items:center;">
  <div style="background:#1e293b; padding:20px; border-radius:12px; width:300px;">
    <h3 id="modalTitle"></h3>

    <input id="fNama" placeholder="Nama">
    <input id="fBulan" placeholder="Bulan">
    <input id="fJumlah" placeholder="Jumlah">

    <select id="fStatus">
      <option value="Lunas">Lunas</option>
      <option value="Belum">Belum</option>
    </select>

    <button onclick="submitForm()">Simpan</button>
    <button onclick="closeModal()">Batal</button>
  </div>
</div>

<!-- SCRIPT -->
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>

<script>
const user = requireAuth();
document.getElementById("welcome").innerText = "Halo, " + user.nama;

// load awal
loadPage("dashboard");
loadDashboard();
loadChart();
</script>

</body>
</html>
